<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="دستاوردهای نیتروورس — پیشرفت خود را دنبال کن و جوایز ویژه دریافت کن" />
  <meta name="keywords" content="دستاورد, پیشرفت, نیتروورس, جایزه, موفقیت" />
  <meta property="og:title" content="🎖 دستاوردها | NitroVerse" />
  <meta property="og:description" content="دستاوردهای خود در نیتروورس را مشاهده کن" />
  <title>🎖 دستاوردها | NitroVerse</title>
  <link rel="icon" href="img/logo.png" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ============================================
       صفحه دستاوردها — استایل‌های اختصاصی
       ============================================ */

    .ach-hero {
      text-align: center;
      padding: 35px 20px 10px;
      animation: fadeInUp 0.7s ease forwards;
    }

    .ach-hero h1 {
      font-size: 2.6rem;
      font-weight: 900;
    }

    .ach-hero .subtitle {
      color: var(--text-secondary);
      font-size: 1.05rem;
      margin-top: 6px;
      opacity: 0.8;
    }

    .ach-hero .subtitle span {
      color: var(--neon-cyan);
      font-weight: 700;
    }

    /* ===== شمارنده ===== */
    .ach-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px auto 10px;
      flex-wrap: wrap;
      animation: fadeInUp 0.7s ease 0.1s forwards;
      opacity: 0;
    }

    .ach-stats .stat {
      text-align: center;
      padding: 12px 28px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.3s ease;
      min-width: 100px;
    }

    .ach-stats .stat:hover {
      border-color: rgba(0, 234, 255, 0.15);
      background: rgba(0, 234, 255, 0.03);
    }

    .ach-stats .stat .number {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--neon-cyan);
      line-height: 1.2;
    }

    .ach-stats .stat .label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      display: block;
      margin-top: 2px;
    }

    .ach-stats .stat.gold .number {
      color: var(--neon-gold);
    }

    .ach-stats .stat.purple .number {
      color: var(--neon-purple);
    }

    /* ===== لیست دستاوردها ===== */
    .ach-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 20px;
      margin-top: 28px;
    }

    .ach-card {
      padding: 24px 20px 20px;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: fadeInUp 0.6s ease forwards;
      opacity: 0;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .ach-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: transparent;
      transition: 0.4s;
    }

    .ach-card.unlocked::before {
      background: linear-gradient(90deg, #22c55e, #4ade80);
    }

    .ach-card:nth-child(1) {
      animation-delay: 0.05s;
    }
    .ach-card:nth-child(2) {
      animation-delay: 0.10s;
    }
    .ach-card:nth-child(3) {
      animation-delay: 0.15s;
    }
    .ach-card:nth-child(4) {
      animation-delay: 0.20s;
    }
    .ach-card:nth-child(5) {
      animation-delay: 0.25s;
    }
    .ach-card:nth-child(6) {
      animation-delay: 0.30s;
    }
    .ach-card:nth-child(7) {
      animation-delay: 0.35s;
    }
    .ach-card:nth-child(8) {
      animation-delay: 0.40s;
    }
    .ach-card:nth-child(9) {
      animation-delay: 0.45s;
    }
    .ach-card:nth-child(10) {
      animation-delay: 0.50s;
    }
    .ach-card:nth-child(11) {
      animation-delay: 0.55s;
    }
    .ach-card:nth-child(12) {
      animation-delay: 0.60s;
    }

    .ach-card:hover {
      transform: translateY(-6px);
    }

    .ach-card .icon {
      font-size: 48px;
      margin-bottom: 8px;
      display: block;
      transition: 0.3s;
    }

    .ach-card.unlocked .icon {
      animation: float 3s ease-in-out infinite;
    }

    .ach-card .ach-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 6px 0 4px;
      color: #fff;
    }

    .ach-card .desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ===== وضعیت قفل/باز ===== */
    .ach-card.locked {
      opacity: 0.4;
      filter: grayscale(0.7);
    }

    .ach-card.locked .icon {
      filter: grayscale(0.8);
    }

    .ach-card.locked:hover {
      transform: translateY(-2px);
    }

    .ach-card.unlocked {
      border-color: rgba(34, 197, 94, 0.25);
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.06);
    }

    /* ===== نوار پیشرفت ===== */
    .ach-progress {
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      margin-top: 14px;
      overflow: hidden;
      position: relative;
    }

    .ach-progress .fill {
      height: 100%;
      width: 0%;
      border-radius: 10px;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ach-card.locked .ach-progress .fill {
      background: linear-gradient(90deg, #555, #888);
    }

    .ach-card .progress-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 4px;
      opacity: 0.6;
    }

    /* ===== برچسب امتیاز ===== */
    .ach-points {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255, 204, 102, 0.1);
      border: 1px solid rgba(255, 204, 102, 0.15);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: var(--neon-gold);
      font-weight: 700;
    }

    .ach-card.locked .ach-points {
      opacity: 0.3;
    }

    /* ===== دکمه بازگشت ===== */
    .back-wrapper {
      text-align: center;
      margin-top: 40px;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 38px;
      border-radius: 40px;
      background: rgba(124, 58, 237, 0.08);
      border: 1px solid rgba(124, 58, 237, 0.2);
      color: var(--neon-purple);
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
      font-size: 1rem;
      cursor: pointer;
    }

    .btn-back:hover {
      background: rgba(124, 58, 237, 0.16);
      box-shadow: 0 0 50px rgba(124, 58, 237, 0.08);
      transform: translateY(-3px);
      border-color: var(--neon-purple);
    }

    /* ===== پاپ‌آپ دستاورد جدید ===== */
    .ach-popup {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.92);
      border: 2px solid #22c55e;
      padding: 18px 34px;
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(34, 197, 94, 0.2);
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 999;
      font-weight: 700;
      font-size: 1.1rem;
      backdrop-filter: blur(16px);
      color: #fff;
      text-align: center;
      max-width: 90%;
    }

    .ach-popup .popup-icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 4px;
    }

    @keyframes popIn {
      0% {
        transform: translateX(-50%) scale(0.6) rotate(-6deg);
        opacity: 0;
      }
      60% {
        transform: translateX(-50%) scale(1.05) rotate(1deg);
        opacity: 1;
      }
      100% {
        transform: translateX(-50%) scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    /* ===== حالت خالی ===== */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-secondary);
    }

    .empty-state .big-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      color: #fff;
      margin-bottom: 8px;
    }

    /* ===== ریسپانسیو ===== */
    @media (max-width: 768px) {
      .ach-hero h1 {
        font-size: 2rem;
      }

      .ach-stats {
        gap: 14px;
      }

      .ach-stats .stat {
        padding: 10px 16px;
        min-width: 80px;
      }

      .ach-stats .stat .number {
        font-size: 1.6rem;
      }

      .ach-list {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
      }
    }

    @media (max-width: 640px) {
      .ach-hero h1 {
        font-size: 1.8rem;
      }

      .ach-stats {
        gap: 10px;
      }

      .ach-stats .stat {
        padding: 8px 14px;
        min-width: 70px;
        flex: 1;
      }

      .ach-stats .stat .number {
        font-size: 1.4rem;
      }

      .ach-stats .stat .label {
        font-size: 0.7rem;
      }

      .ach-list {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .ach-card {
        padding: 16px 14px;
      }

      .ach-card .icon {
        font-size: 36px;
      }

      .btn-back {
        padding: 12px 24px;
        font-size: 0.9rem;
        width: 100%;
        justify-content: center;
      }

      .ach-popup {
        font-size: 0.95rem;
        padding: 14px 20px;
      }
    }

    @media (max-width: 400px) {
      .ach-hero h1 {
        font-size: 1.5rem;
      }

      .ach-stats .stat .number {
        font-size: 1.2rem;
      }

      .ach-card .ach-title {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- ===== هدر ===== -->
    <div class="ach-hero">
      <h1 class="neon-text">🎖 دستاوردهای من</h1>
      <p class="subtitle">با فعالیت و یادگیری بیشتر، دستاوردهای جدید باز کن و <span>امتیاز ویژه</span> دریافت کن!</p>
    </div>

    <!-- ===== آمار ===== -->
    <div class="ach-stats" id="statsBar">
      <div class="stat">
        <div class="number" id="unlockedCount">0</div>
        <div class="label">🎯 بازشده</div>
      </div>
      <div class="stat">
        <div class="number" id="totalCount">0</div>
        <div class="label">📋 کل دستاوردها</div>
      </div>
      <div class="stat gold">
        <div class="number" id="totalPoints">0</div>
        <div class="label">⭐ امتیاز جمع‌آوری‌شده</div>
      </div>
      <div class="stat purple">
        <div class="number" id="progressPercent">0%</div>
        <div class="label">📈 پیشرفت</div>
      </div>
    </div>

    <!-- ===== لیست ===== -->
    <div id="achievements" class="ach-list"></div>

    <!-- ===== دکمه بازگشت ===== -->
    <div class="back-wrapper">
      <button class="btn-back" onclick="location.href='profile.html'">
        👤 بازگشت به پروفایل
      </button>
    </div>

  </div>

  <script>
    // ============================================
    // تنظیمات
    // ============================================
    const ACH_KEY = 'nv_achievements';
    const HIST_KEY = 'nv_quiz_history';
    const RATING_KEY = 'nv_rating';

    // ===== داده‌های دستاوردها (از data.js استفاده کن) =====
    const achievementsData = [{
      id: 'first_play',
      title: 'اولین بازی!',
      desc: 'اولین باری که در آزمون شرکت کردی.',
      icon: '🎯',
      target: 1,
      type: 'plays',
      points: 10,
      category: 'شروع'
    }, {
      id: 'ten_correct',
      title: '۱۰ پاسخ صحیح!',
      desc: '۱۰ پاسخ صحیح گرفتی!',
      icon: '💡',
      target: 10,
      type: 'correct',
      points: 20,
      category: 'دقت'
    }, {
      id: 'fifty_points',
      title: '۵۰ امتیاز!',
      desc: '۵۰ امتیاز در مجموع گرفتی!',
      icon: '🔥',
      target: 50,
      type: 'score',
      points: 30,
      category: 'امتیاز'
    }, {
      id: 'three_days',
      title: '۳ روز فعال!',
      desc: '۳ روز پشت سر هم فعالیت کردی.',
      icon: '📅',
      target: 3,
      type: 'days',
      points: 25,
      category: 'فعالیت'
    }, {
      id: 'hundred_points',
      title: '۱۰۰ امتیاز!',
      desc: 'به ۱۰۰ امتیاز رسیدی!',
      icon: '🏆',
      target: 100,
      type: 'score',
      points: 40,
      category: 'امتیاز'
    }, {
      id: 'immortal',
      title: 'رنک ایمورتال!',
      desc: 'رتبه ۱ در لیدربورد رو کسب کردی!',
      icon: '👑',
      target: 1,
      type: 'rank',
      points: 100,
      category: 'رنک'
    }, {
      id: 'perfect_score',
      title: 'نمره کامل!',
      desc: 'همه سوالات رو درست جواب دادی!',
      icon: '🎯',
      target: 100,
      type: 'perfect',
      points: 50,
      category: 'دقت'
    }, {
      id: 'speed_demon',
      title: 'شیطان سرعت!',
      desc: '۱۰ سوال را در کمتر از ۳۰ ثانیه جواب دادی!',
      icon: '⚡',
      target: 10,
      type: 'speed',
      points: 35,
      category: 'سرعت'
    }, {
      id: 'legendary_rank',
      title: 'رنک افسانه‌ای!',
      desc: 'به رنک افسانه‌ای رسیدی!',
      icon: '⭐',
      target: 1,
      type: 'rank_legendary',
      points: 75,
      category: 'رنک'
    }, {
      id: 'shopaholic',
      title: 'خریدار حرفه‌ای!',
      desc: '۵ آیتم از فروشگاه خریدی!',
      icon: '🛍️',
      target: 5,
      type: 'shop',
      points: 30,
      category: 'فروشگاه'
    }, {
      id: 'social_butterfly',
      title: 'پروانه اجتماعی!',
      desc: 'به ۳ گروه مختلف پیوستی!',
      icon: '🦋',
      target: 3,
      type: 'groups',
      points: 20,
      category: 'اجتماعی'
    }, {
      id: 'nitro_master',
      title: 'استاد نیترو!',
      desc: '۱۰۰۰ امتیاز جمع کردی!',
      icon: '💎',
      target: 1000,
      type: 'score',
      points: 60,
      category: 'امتیاز'
    }];

    // ============================================
    // توابع کمکی (با پشتیبانی از userId)
    // ============================================

    function getUserKey(baseKey) {
      const userId = localStorage.getItem('nv_user_id') || 'guest';
      return `${baseKey}_${userId}`;
    }

    function getUserData(baseKey, defaultValue = null) {
      try {
        const key = getUserKey(baseKey);
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : defaultValue;
      } catch {
        return defaultValue;
      }
    }

    function setUserData(baseKey, data) {
      try {
        const key = getUserKey(baseKey);
        localStorage.setItem(key, JSON.stringify(data));
        return true;
      } catch {
        return false;
      }
    }

    function getHistory() {
      return getUserData(HIST_KEY, []);
    }

    function getAchievements() {
      return getUserData(ACH_KEY, {});
    }

    function saveAchievements(data) {
      return setUserData(ACH_KEY, data);
    }

    function getRating() {
      return getUserData(RATING_KEY, 0);
    }

    function getTotalScore(history) {
      return history.reduce((sum, h) => sum + (h.score || 0), 0);
    }

    function getTotalCorrect(history) {
      let count = 0;
      history.forEach(h => {
        if (h.correct && h.total) {
          count += h.correct;
        } else if (h.score > 0 && h.total) {
          count += Math.round(h.score / (h.total || 1));
        }
      });
      return count;
    }

    function getActiveDays(history) {
      const days = history.map(h => {
        if (h.date) {
          return new Date(h.date).toLocaleDateString('fa-IR');
        }
        return null;
      }).filter(Boolean);
      return [...new Set(days)];
    }

    function getRank() {
      try {
        const rating = getRating();
        if (rating >= 4000) return 'immortal';
        if (rating >= 3000) return 'legendary';
        if (rating >= 2200) return 'diamond';
        if (rating >= 1500) return 'gold';
        if (rating >= 1000) return 'silver';
        if (rating >= 500) return 'bronze';
        return 'normal';
      } catch {
        return 'normal';
      }
    }

    function getShopItems() {
      return getUserData('nv_shop_items', []);
    }

    function getMyGroups() {
      return getUserData('nv_my_groups', []);
    }

    function hasPerfectScore(history) {
      return history.some(h => h.correct === h.total && h.total >= 5);
    }

    function hasSpeedRun(history) {
      return history.some(h => h.avgTime && h.avgTime < 3 && h.total >= 10);
    }

    // ============================================
    // محاسبه وضعیت دستاوردها
    // ============================================
    function calculateAchievements() {
      const history = getHistory();
      const saved = getAchievements();
      const result = { ...saved };
      let totalPoints = 0;

      const totalScore = getTotalScore(history);
      const totalCorrect = getTotalCorrect(history);
      const activeDays = getActiveDays(history);
      const currentRank = getRank();
      const shopItems = getShopItems();
      const myGroups = getMyGroups();

      // first_play
      if (history.length > 0 && !result.first_play) {
        result.first_play = true;
        showAchievementPopup('first_play');
      }

      // ten_correct
      if (totalCorrect >= 10 && !result.ten_correct) {
        result.ten_correct = true;
        showAchievementPopup('ten_correct');
      }

      // fifty_points
      if (totalScore >= 50 && !result.fifty_points) {
        result.fifty_points = true;
        showAchievementPopup('fifty_points');
      }

      // hundred_points
      if (totalScore >= 100 && !result.hundred_points) {
        result.hundred_points = true;
        showAchievementPopup('hundred_points');
      }

      // three_days
      if (activeDays.length >= 3 && !result.three_days) {
        result.three_days = true;
        showAchievementPopup('three_days');
      }

      // immortal
      if (currentRank === 'immortal' && !result.immortal) {
        result.immortal = true;
        showAchievementPopup('immortal');
      }

      // perfect_score
      if (hasPerfectScore(history) && !result.perfect_score) {
        result.perfect_score = true;
        showAchievementPopup('perfect_score');
      }

      // speed_demon
      if (hasSpeedRun(history) && !result.speed_demon) {
        result.speed_demon = true;
        showAchievementPopup('speed_demon');
      }

      // legendary_rank
      if (currentRank === 'legendary' && !result.legendary_rank) {
        result.legendary_rank = true;
        showAchievementPopup('legendary_rank');
      }

      // shopaholic
      if (shopItems.length >= 5 && !result.shopaholic) {
        result.shopaholic = true;
        showAchievementPopup('shopaholic');
      }

      // social_butterfly
      if (myGroups.length >= 3 && !result.social_butterfly) {
        result.social_butterfly = true;
        showAchievementPopup('social_butterfly');
      }

      // nitro_master
      if (totalScore >= 1000 && !result.nitro_master) {
        result.nitro_master = true;
        showAchievementPopup('nitro_master');
      }

      saveAchievements(result);

      // محاسبه امتیاز کل
      achievementsData.forEach(ach => {
        if (result[ach.id]) {
          totalPoints += ach.points || 0;
        }
      });

      return { unlocked: result, totalPoints };
    }

    // ============================================
    // پاپ‌آپ دستاورد جدید
    // ============================================
    let popupTimeout = null;

    function showAchievementPopup(achId) {
      const ach = achievementsData.find(a => a.id === achId);
      if (!ach) return;

      // جلوگیری از پاپ‌آپ‌های همزمان
      if (popupTimeout) return;

      const old = document.querySelector('.ach-popup');
      if (old) old.remove();

      const popup = document.createElement('div');
      popup.className = 'ach-popup';
      popup.innerHTML = `
        <span class="popup-icon">${ach.icon}</span>
        🎉 دستاورد جدید: <strong>${ach.title}</strong>
        <br><span style="font-size: 0.85rem; opacity: 0.7;">+${ach.points} امتیاز</span>
      `;
      document.body.appendChild(popup);

      popupTimeout = setTimeout(() => {
        popup.style.opacity = '0';
        popup.style.transition = '0.5s ease';
        setTimeout(() => {
          popup.remove();
          popupTimeout = null;
        }, 500);
      }, 3200);
    }

    // ============================================
    // رندر
    // ============================================
    function renderAchievements() {
      const result = calculateAchievements();
      const unlocked = result.unlocked;
      const container = document.getElementById('achievements');
      const total = achievementsData.length;
      let unlockedCount = 0;

      container.innerHTML = '';

      achievementsData.forEach((ach, index) => {
        const isUnlocked = !!unlocked[ach.id];
        if (isUnlocked) unlockedCount++;

        // محاسبه پیشرفت
        let progress = 0;
        const history = getHistory();
        const totalScore = getTotalScore(history);
        const totalCorrect = getTotalCorrect(history);
        const activeDays = getActiveDays(history);
        const currentRank = getRank();
        const shopItems = getShopItems();
        const myGroups = getMyGroups();

        switch (ach.type) {
          case 'score':
            progress = Math.min(100, (totalScore / ach.target) * 100);
            break;
          case 'correct':
            progress = Math.min(100, (totalCorrect / ach.target) * 100);
            break;
          case 'days':
            progress = Math.min(100, (activeDays.length / ach.target) * 100);
            break;
          case 'plays':
            progress = Math.min(100, (history.length / ach.target) * 100);
            break;
          case 'rank':
            progress = currentRank === 'immortal' ? 100 : 0;
            break;
          case 'rank_legendary':
            progress = currentRank === 'legendary' || currentRank === 'immortal' ? 100 : 0;
            break;
          case 'perfect':
            progress = hasPerfectScore(history) ? 100 : 0;
            break;
          case 'speed':
            progress = hasSpeedRun(history) ? 100 : 0;
            break;
          case 'shop':
            progress = Math.min(100, (shopItems.length / ach.target) * 100);
            break;
          case 'groups':
            progress = Math.min(100, (myGroups.length / ach.target) * 100);
            break;
          default:
            progress = isUnlocked ? 100 : 0;
        }

        const card = document.createElement('div');
        card.className = `ach-card glow-card ${isUnlocked ? 'unlocked' : 'locked'}`;
        card.style.animationDelay = `${(index * 0.05)}s`;

        card.innerHTML = `
          <span class="ach-points">+${ach.points || 0}⭐</span>
          <span class="icon">${ach.icon}</span>
          <h4 class="ach-title">${ach.title}</h4>
          <p class="desc">${ach.desc}</p>
          <div class="ach-progress">
            <div class="fill" style="width: ${Math.min(100, Math.round(progress))}%;"></div>
          </div>
          <div class="progress-label">${Math.min(100, Math.round(progress))}%</div>
        `;

        container.appendChild(card);
      });

      // به‌روزرسانی آمار
      document.getElementById('unlockedCount').textContent = unlockedCount;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('totalPoints').textContent = result.totalPoints || 0;
      document.getElementById('progressPercent').textContent =
        Math.round((unlockedCount / total) * 100) + '%';
    }

    // ============================================
    // اجرا
    // ============================================
    document.addEventListener('DOMContentLoaded', renderAchievements);

    // هر بار که صفحه نمایش داده می‌شه، دوباره رندر کن
    window.addEventListener('focus', renderAchievements);

    console.log('🎖 NitroVerse Achievements loaded!');
  </script>

</body>
</html>
